name: Publish

# npm side: thin caller for the canonical mnemom/.github/npm-publish.yml
# reusable (ADR-020). PyPI Trusted Publishing does NOT support reusable
# workflows (https://docs.pypi.org/trusted-publishers/troubleshooting/#reusable-workflows-on-github),
# so the PyPI publish step is INLINE here. Don't try to lift it into a
# reusable — the OIDC token's `job_workflow_ref` claim points to the
# reusable, and PyPI rejects with `invalid-publisher`. Verified painfully
# May 8, 2026 (the canonical mnemom/.github/.github/workflows/pypi-publish.yml
# is retained for token-based publishes and as a non-OIDC SBOM utility).
#
# Repo-specific logic stays inline either way:
#   - validate: tag vs. packages/typescript/package.json + packages/python/pyproject.toml versions
#   - test: TypeScript build/typecheck/test + Python mypy/pytest
#
# The dispatch-publish path fires both publishes in parallel on every main
# push; each path's skip-on-existing handles unchanged versions.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: false
        type: string
        default: "packages/typescript"


permissions: {}
jobs:
  # ── Release-triggered: validate → test → (publish-npm, publish-pypi) ──

  validate:
    permissions:
      contents: read
    if: github.event_name == 'release'
    name: Validate versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Check Python version
        working-directory: packages/python
        run: |
          PYPI_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$PYPI_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: pyproject.toml version ($PYPI_VERSION) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi
      - name: Check npm version
        run: |
          NPM_VERSION=$(node -p "require('./packages/typescript/package.json').version")
          if [ "$NPM_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: package.json version ($NPM_VERSION) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

  test:
    permissions:
      contents: read
    if: github.event_name == 'release'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: TypeScript checks
        working-directory: packages/typescript
        run: |
          npm ci || npm install
          npm run typecheck
          npm run build
          npm test
      - name: Python checks
        working-directory: packages/python
        run: |
          pip install -e ".[dev]"
          mypy src/
          pytest

  publish-pypi:
    name: Publish to PyPI
    needs: [validate, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC → PyPI Trusted Publisher
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: packages/python/dist/

  publish-npm:
    needs: [validate, test]
    if: github.event_name == 'release'
    permissions:
      contents: write   # for SBOM attach to GitHub Release
      id-token: write   # for npm OIDC Trusted Publisher
    # mnemom/.github @ scale/step-29-bump-node24-actions merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@3b60e34e88113070235f2d55248a3455295be153
    with:
      npm-directory: packages/typescript
      tag: latest

  # ── Orchestrator dispatch publishing ──
  #
  # Both jobs fire in parallel on every main push. Each one's skip-on-existing
  # logic makes a no-op publish idempotent — when version is unchanged from
  # the registry, the call short-circuits without touching the registry.

  dispatch-publish-npm:
    if: github.event_name == 'workflow_dispatch'
    # contents: write is over-granted relative to what dispatch-publish does
    # (the `gh release upload` step in the reusable workflow is gated on
    # `event_name == 'release'` and never runs here). But GitHub validates
    # caller permissions against the called workflow's declared permissions
    # at workflow load time, before any `if:` is evaluated.
    permissions:
      contents: write
      id-token: write
    # mnemom/.github @ scale/step-29-bump-node24-actions merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@3b60e34e88113070235f2d55248a3455295be153
    with:
      # Defensive defaults: GitHub validates `with:` expressions at load time,
      # before `if:` is evaluated. On a release event the `inputs` context is
      # empty; the `||` fallback keeps the expression valid on both event types.
      npm-directory: ${{ inputs.npm-directory || 'packages/typescript' }}
      dispatch-id: ${{ inputs.dispatch-id || '' }}
      tag: latest
      attach-sbom-to-release: false   # dispatch path has no release to attach to

  dispatch-publish-pypi:
    name: Publish packages/python (dispatch)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC → PyPI Trusted Publisher
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Read package metadata
        id: meta
        working-directory: packages/python
        run: |
          PKG_NAME=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['name'])
          ")
          PKG_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "pkg-name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "pkg-version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
      - name: Check if already published
        id: check
        run: |
          PKG_NAME="${{ steps.meta.outputs.pkg-name }}"
          PKG_VERSION="${{ steps.meta.outputs.pkg-version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/${PKG_NAME}/${PKG_VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "${PKG_NAME}@${PKG_VERSION} already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish ${PKG_NAME}@${PKG_VERSION}"
          fi
      - name: Build sdist + wheel
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      - name: Publish to PyPI (Trusted Publisher)
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: packages/python/dist/
          skip-existing: true
