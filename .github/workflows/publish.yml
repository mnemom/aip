name: Publish

# Thin caller for the canonical publish recipes — see ADR-020.
# Both npm and PyPI logic now live in reusable workflows under mnemom/.github:
#   - npm-publish.yml  (provenance, SBOM, OIDC Trusted Publisher)
#   - pypi-publish.yml (provenance via Trusted Publisher, SBOM, skip-existing)
# To change either recipe, edit the canonical workflow there; do not re-add
# steps inline here.
#
# Repo-specific logic that stays inline:
#   - validate: tag vs. packages/typescript/package.json + packages/python/pyproject.toml versions
#   - test: TypeScript build/typecheck/test + Python mypy/pytest
#
# The dispatch-publish path now invokes BOTH reusables in parallel — the
# orchestrator-driven auto-publish on every main push tries to ship both
# packages, with each reusable's idempotent skip-on-existing handling the
# unchanged-version case. Closes the npm/PyPI parity gap (May 8, 2026 audit).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: false
        type: string
        default: "packages/typescript"


permissions: {}
jobs:
  # ── Release-triggered: validate → test → (publish-npm, publish-pypi) ──

  validate:
    permissions:
      contents: read
    if: github.event_name == 'release'
    name: Validate versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Check Python version
        working-directory: packages/python
        run: |
          PYPI_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$PYPI_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: pyproject.toml version ($PYPI_VERSION) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi
      - name: Check npm version
        run: |
          NPM_VERSION=$(node -p "require('./packages/typescript/package.json').version")
          if [ "$NPM_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: package.json version ($NPM_VERSION) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

  test:
    permissions:
      contents: read
    if: github.event_name == 'release'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: TypeScript checks
        working-directory: packages/typescript
        run: |
          npm ci || npm install
          npm run typecheck
          npm run build
          npm test
      - name: Python checks
        working-directory: packages/python
        run: |
          pip install -e ".[dev]"
          mypy src/
          pytest

  publish-pypi:
    needs: [validate, test]
    if: github.event_name == 'release'
    permissions:
      contents: write   # for SBOM attach to GitHub Release
      id-token: write   # for PyPI OIDC Trusted Publisher
    # mnemom/.github @ feat/pypi-publish-reusable HEAD — TODO: bump to main SHA
    # once https://github.com/mnemom/.github/pull/13 merges.
    uses: mnemom/.github/.github/workflows/pypi-publish.yml@43b2c8de15e1a1d737a667782830bbbaa90100e5
    with:
      python-directory: packages/python

  publish-npm:
    needs: [validate, test]
    if: github.event_name == 'release'
    permissions:
      contents: write   # for SBOM attach to GitHub Release
      id-token: write   # for npm OIDC Trusted Publisher
    # mnemom/.github @ scale/step-29-bump-node24-actions merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@3b60e34e88113070235f2d55248a3455295be153
    with:
      npm-directory: packages/typescript
      tag: latest

  # ── Orchestrator dispatch publishing ──
  #
  # The orchestrator's auto-publish-on-main-push fires both jobs below in
  # parallel. Each reusable's skip-on-existing logic makes a no-op publish
  # idempotent — when version is unchanged from the registry, the call
  # short-circuits without touching the registry.

  dispatch-publish-npm:
    if: github.event_name == 'workflow_dispatch'
    # contents: write is over-granted relative to what dispatch-publish does
    # (the `gh release upload` step in the reusable workflow is gated on
    # `event_name == 'release'` and never runs here). But GitHub validates
    # caller permissions against the called workflow's declared permissions
    # at workflow load time, before any `if:` is evaluated.
    permissions:
      contents: write
      id-token: write
    # mnemom/.github @ scale/step-29-bump-node24-actions merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@3b60e34e88113070235f2d55248a3455295be153
    with:
      # Defensive defaults: GitHub validates `with:` expressions at load time,
      # before `if:` is evaluated. On a release event the `inputs` context is
      # empty; the `||` fallback keeps the expression valid on both event types.
      npm-directory: ${{ inputs.npm-directory || 'packages/typescript' }}
      dispatch-id: ${{ inputs.dispatch-id || '' }}
      tag: latest
      attach-sbom-to-release: false   # dispatch path has no release to attach to

  dispatch-publish-pypi:
    if: github.event_name == 'workflow_dispatch'
    # Same over-granting rationale as dispatch-publish-npm above —
    # GitHub validates declared permissions before evaluating `if:`.
    permissions:
      contents: write
      id-token: write
    # mnemom/.github @ feat/pypi-publish-reusable HEAD — TODO: bump to main SHA
    # once https://github.com/mnemom/.github/pull/13 merges.
    uses: mnemom/.github/.github/workflows/pypi-publish.yml@43b2c8de15e1a1d737a667782830bbbaa90100e5
    with:
      python-directory: packages/python
      dispatch-id: ${{ inputs.dispatch-id || '' }}
      attach-sbom-to-release: false   # dispatch path has no release to attach to
