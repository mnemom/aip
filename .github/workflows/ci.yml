name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions: {}
jobs:
  typescript:
    permissions:
      contents: read
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  python:
    permissions:
      contents: read
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/python

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv + Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Check uv.lock is in sync with pyproject.toml
        run: uv lock --check

      - name: Install dependencies (frozen, from uv.lock)
        run: uv sync --locked --extra dev

      - name: Lint
        run: uv run --locked --extra dev ruff check src/ tests/

      - name: Typecheck
        # mypy's target is fixed by [tool.mypy] python_version = "3.10" in
        # pyproject.toml, so it produces identical results on every matrix
        # interpreter — running it on all three legs was redundant. Gated to the
        # highest matrix version (3.12) so it runs exactly once.
        if: matrix.python-version == '3.12'
        run: uv run --locked --extra dev mypy src/

      - name: Test
        run: uv run --locked --extra dev pytest

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: packages/python/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  dispatch-deploy:
    permissions:
      contents: read
    name: Trigger Deploy
    needs: [typescript, python]
    if: >-
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom

      - name: Commit subject
        id: commit
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: printf 'title=%s\n' "${HEAD_COMMIT_MESSAGE%%$'\n'*}" >> "$GITHUB_OUTPUT"

      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: mnemom/deploy
          event-type: deploy
          client-payload: >-
            {
              "repo": "${{ github.event.repository.name }}",
              "sha": "${{ github.sha }}",
              "commit_title": ${{ toJSON(steps.commit.outputs.title) }},
              "environment": "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
            }
